<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x30"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Blog preview card</title>

  </head>
  <body>
    <main class="blog-card">
      <img
        src="assets/images/illustration-article.svg"
        alt="illustrationimage" id="blogimg"
      />

      <div class="blog-content">
        <h3 class="blog-tag">Learning</h3>
        <p class="blog-date">Published 21 Dec 2023</p>

        <h1>HTML & CSS foundations</h1>

        <p class="blog-text">
          These languages are the backbone of every website structure, content
          and presentation.
        </p>

        <div class="avater">
         <div>  <img src="assets/images/image-avatar.webp" alt="avater" /> </div>

          <h4>Greg Hooper</h4>
        </div>

       
      </div>
    </main>
  
  </body>
</html>
